kind = "web"
previewPath = "/"
title = "WiFi Hacker Game"
version = "1.0.0"
id = "artifacts/wifi-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20713

[services.development]
run = "pnpm --filter @workspace/wifi-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wifi-game", "run", "build" ]
publicDir = "artifacts/wifi-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20713"
BASE_PATH = "/"
